<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d7ecff" />
      <stop offset="100%" stop-color="#f3f7db" />
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fffdf6" />
      <stop offset="100%" stop-color="#efe6d1" />
    </linearGradient>
    <style>
      .title { font: 700 28px Arial, sans-serif; fill: #203040; }
      .label { font: 600 18px Arial, sans-serif; fill: #243746; }
      .small { font: 500 14px Arial, sans-serif; fill: #34495a; }
      .tiny { font: 500 12px Arial, sans-serif; fill: #4e6272; }
      .hud { font: 700 20px Arial, sans-serif; fill: #18242d; }
      .outline { stroke: #253847; stroke-width: 3; }
      .soft { stroke: #4d6678; stroke-width: 2; stroke-dasharray: 8 6; fill: none; }
    </style>
  </defs>

  <rect width="1600" height="980" fill="url(#bg)" />

  <text x="60" y="54" class="title">坦克大战 Web 版界面示意图</text>
  <text x="60" y="84" class="small">目标：大地图 + 小地图 + 可拖动画面 + 回合战斗 + 平台资源破坏</text>

  <rect x="40" y="110" width="1180" height="760" rx="20" fill="#b9d7e8" class="outline" />
  <text x="70" y="146" class="hud">主战场视图</text>
  <text x="190" y="146" class="small">当前镜头只显示大地图中的一部分，未锁定时可拖动查看</text>

  <rect x="80" y="170" width="1100" height="650" rx="14" fill="#dff1ff" stroke="#7da0b6" stroke-width="2" />

  <path d="M90 795 L1170 795" stroke="#78909c" stroke-width="4" stroke-dasharray="10 10" />
  <text x="96" y="788" class="tiny">最下层承接道路，防止无限坠落</text>

  <rect x="120" y="720" width="180" height="32" rx="8" fill="#7d6753" />
  <rect x="322" y="700" width="120" height="28" rx="8" fill="#8c735c" />
  <rect x="210" y="610" width="150" height="28" rx="8" fill="#8c735c" />
  <rect x="460" y="650" width="145" height="30" rx="8" fill="#8c735c" />
  <rect x="150" y="500" width="120" height="26" rx="8" fill="#8c735c" />
  <rect x="310" y="430" width="140" height="26" rx="8" fill="#8c735c" />
  <rect x="530" y="520" width="100" height="24" rx="8" fill="#8c735c" />

  <rect x="900" y="720" width="170" height="32" rx="8" fill="#7d6753" />
  <rect x="760" y="690" width="120" height="28" rx="8" fill="#8c735c" />
  <rect x="880" y="610" width="160" height="28" rx="8" fill="#8c735c" />
  <rect x="680" y="560" width="120" height="26" rx="8" fill="#8c735c" />
  <rect x="945" y="500" width="120" height="26" rx="8" fill="#8c735c" />
  <rect x="760" y="430" width="150" height="26" rx="8" fill="#8c735c" />
  <rect x="980" y="400" width="110" height="24" rx="8" fill="#8c735c" />

  <path d="M640 758 q34 -30 58 0 q-26 22 -58 0z" fill="#d8c59d" stroke="#6c5a43" stroke-width="2" opacity="0.95" />
  <path d="M662 724 q32 -24 54 0 q-18 20 -54 0z" fill="#d8c59d" stroke="#6c5a43" stroke-width="2" opacity="0.8" />
  <text x="616" y="708" class="tiny">中央抛射空间</text>

  <rect x="186" y="584" width="42" height="18" rx="6" fill="#366f4d" stroke="#1f4530" stroke-width="2" />
  <rect x="199" y="570" width="34" height="10" rx="4" fill="#2f5c87" stroke="#203d5a" stroke-width="2" />
  <line x1="228" y1="574" x2="246" y2="560" stroke="#203d5a" stroke-width="3" />
  <text x="112" y="560" class="small">玩家 A</text>

  <rect x="983" y="474" width="42" height="18" rx="6" fill="#7d433e" stroke="#452320" stroke-width="2" />
  <rect x="995" y="460" width="34" height="10" rx="4" fill="#5f4e94" stroke="#3e3362" stroke-width="2" />
  <line x1="995" y1="464" x2="978" y2="450" stroke="#3e3362" stroke-width="3" />
  <text x="1035" y="458" class="small">玩家 B</text>

  <circle cx="580" cy="466" r="16" fill="#3d3d3d" />
  <circle cx="580" cy="466" r="28" fill="none" stroke="#5c6770" stroke-width="4" stroke-dasharray="6 6" />
  <text x="603" y="472" class="small">爆炸坑洞示意</text>

  <rect x="315" y="430" width="140" height="26" rx="8" fill="none" stroke="#ca6f1e" stroke-width="4" stroke-dasharray="9 7" />
  <text x="270" y="405" class="small">危险平台：达到脆弱等级后</text>
  <text x="271" y="427" class="small">坦克经过或再受击会塌</text>

  <path d="M140 250 C260 210, 360 220, 460 260" class="soft" />
  <text x="120" y="224" class="small">左侧高台区</text>
  <path d="M835 250 C935 215, 1030 215, 1110 250" class="soft" />
  <text x="1010" y="224" class="small">右侧高台区</text>

  <rect x="1260" y="110" width="300" height="220" rx="20" fill="url(#panel)" class="outline" />
  <text x="1288" y="146" class="hud">小地图</text>
  <rect x="1288" y="168" width="244" height="126" rx="12" fill="#d6eadf" stroke="#708a7c" stroke-width="2" />
  <rect x="1310" y="264" width="210" height="16" rx="6" fill="#6f5b4c" />
  <rect x="1322" y="246" width="34" height="8" rx="3" fill="#7d6753" />
  <rect x="1368" y="224" width="28" height="8" rx="3" fill="#7d6753" />
  <rect x="1460" y="222" width="30" height="8" rx="3" fill="#7d6753" />
  <rect x="1488" y="246" width="24" height="8" rx="3" fill="#7d6753" />
  <rect x="1314" y="238" width="8" height="8" rx="2" fill="#2e8b57" />
  <rect x="1488" y="214" width="8" height="8" rx="2" fill="#b24c4c" />
  <rect x="1388" y="196" width="92" height="48" fill="none" stroke="#23495f" stroke-width="3" />
  <text x="1288" y="314" class="small">显示整张地图、双方位置和当前镜头框</text>

  <rect x="1260" y="350" width="300" height="180" rx="20" fill="url(#panel)" class="outline" />
  <text x="1288" y="386" class="hud">回合与风力</text>
  <text x="1290" y="420" class="label">当前回合：玩家 A</text>
  <text x="1290" y="452" class="label">倒计时：08s</text>
  <text x="1290" y="484" class="label">风向：→</text>
  <text x="1390" y="484" class="label">风力：3</text>
  <rect x="1290" y="500" width="210" height="16" rx="8" fill="#cfd8dc" stroke="#607d8b" stroke-width="2" />
  <rect x="1370" y="502" width="92" height="12" rx="6" fill="#ef6c00" />
  <text x="1290" y="548" class="small">回合信息固定显示，风力条用于预判弹道偏移</text>

  <rect x="1260" y="548" width="300" height="172" rx="20" fill="url(#panel)" class="outline" />
  <text x="1288" y="584" class="hud">瞄准与蓄力</text>
  <text x="1290" y="616" class="label">仰角：42°</text>
  <text x="1290" y="648" class="label">武器：普通炮</text>
  <rect x="1290" y="668" width="220" height="20" rx="10" fill="#d8d8d8" stroke="#707070" stroke-width="2" />
  <rect x="1294" y="672" width="148" height="12" rx="6" fill="#f5a623" />
  <line x1="1440" y1="664" x2="1440" y2="692" stroke="#b23b3b" stroke-width="4" />
  <text x="1290" y="708" class="small">蓄力条满后往返摆动，红线表示当前松手输出点</text>

  <rect x="1260" y="740" width="300" height="130" rx="20" fill="url(#panel)" class="outline" />
  <text x="1288" y="776" class="hud">操作提示</text>
  <text x="1290" y="808" class="small">Left / Right：移动</text>
  <text x="1290" y="832" class="small">Shift：跳跃</text>
  <text x="1290" y="856" class="small">Space：蓄力并发射</text>
  <text x="1430" y="832" class="small">Up / Down：调仰角</text>

  <rect x="80" y="842" width="1100" height="18" rx="9" fill="#d8d2c2" stroke="#7f7b70" stroke-width="2" />
  <rect x="82" y="844" width="230" height="14" rx="7" fill="#9e9d24" opacity="0.85" />
  <text x="320" y="856" class="tiny">底部可作为距离刻度或镜头拖拽辅助区</text>
</svg>
